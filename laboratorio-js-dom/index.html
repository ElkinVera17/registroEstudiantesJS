<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratorio DOM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <main class="container py-5">
    <section class="card shadow-sm">
      <div class="card-body">

        <h1 class="h4 mb-3">Registro de estudiantes</h1>
        <p class="text-muted">
          Ingrese los datos del estudiante y agréguelo dinámicamente a la tabla.
        </p>

        <div class="row g-3">
          <div class="col-md-4">
            <label for="nombre" class="form-label">Nombre</label>
            <input id="nombre" type="text" class="form-control" placeholder="Ejemplo: Ana Torres">
          </div>

          <div class="col-md-4">
            <label for="carrera" class="form-label">Carrera</label>
            <select id="carrera" class="form-select">
              <option value="">Seleccione...</option>
              <option value="Tecnologías de la Información">Tecnologías de la Información</option>
              <option value="Software">Software</option>
              <option value="Sistemas">Sistemas</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="semestre" class="form-label">Semestre</label>
            <input id="semestre" type="number" class="form-control" min="1" max="10">
          </div>
        </div>

        <div class="mt-4 d-flex gap-2 flex-wrap">
          <button id="btnAgregar" class="btn btn-primary">Agregar estudiante</button>
          <button id="btnLimpiar" class="btn btn-outline-secondary">Limpiar tabla</button>
          <button id="btnJSONGeneral" class="btn btn-outline-secondary">Ver JSON General </button>
          <button id="eliminar" class="btn btn-danger">Eliminar Todo</button>
        </div>

        <div id="mensaje" class="alert mt-3 d-none"></div>

        <div class="row g-3">
          <h3 class="h4 ">Buscar</h3>

          <div class="col-md-6">
            
            <label for="txtBuscar" class="form-label">
              Nombre,carrera o semetre
            </label>
            <input id="txtBuscar" type="text" class="form-control" placeholder="Ejemplo: Ana Torres">
            <button id="btnBuscar" class="btn btn-outline-secondary mt-3">Buscar</button>
            <button id="btnLimpiarBusqueda" class="btn btn-outline-secondary mt-3">Limpiar búsqueda</button>
          </div>

          
             <div class="col-md-6">
            <label for="selectCarrera" class="form-label">Carrera</label>
            <select id="selectCarrera" class="form-select">
              <option value="Todas">Todas</option>
              <option value="Tecnologías de la Información">Tecnologías de la Información</option>
              <option value="Software">Software</option>
              <option value="Sistemas">Sistemas</option> 
            </select>

            <button id="btnFiltrar" class="btn btn-outline-secondary mt-3">Filtrar</button>



          </div>
        </div>

        <p class="mt-3">
          Total de estudiantes registrados: <strong id="totalEstudiantes">0</strong>
        </p>

        <table class="table table-striped table-bordered mt-3">
          <thead class="table-dark">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Carrera</th>
              <th>Semestre</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="cuerpoTabla"></tbody>
        </table>

      </div>

    </section>

  </main>

  <!--modal boostrap -->
  <div class="modal fade" id="modalJSON" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Información del estudiante</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <pre id="contenidoJSON"></pre>
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cerrar
          </button>
        </div>

      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="app.js"></script>


</body>

</html>
